<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h2>AI Research Assistant</h2>
  </div>
  
  <div class="tabs">
    <button class="tab-btn active" data-target="tab-summarize">Summarize</button>
    <button class="tab-btn" data-target="tab-chat">Chat</button>
    <button class="tab-btn" data-target="tab-settings">Settings</button>
  </div>

  <div class="content">
    <!-- Summarize Tab -->
    <div id="tab-summarize" class="tab-content active">
      <button id="summarize-btn" class="primary-btn">Summarize Current Page</button>
      
      <div id="summarize-loading" class="loading-container hidden">
        <div class="spinner"></div>
        <span>Analyzing page content...</span>
      </div>
      
      <div id="summarize-result-container" class="hidden">
        <div class="result-actions">
          <span class="result-title">Summary</span>
          <button id="summarize-copy-btn" class="icon-btn">Copy</button>
        </div>
        <div id="summarize-result" class="markdown-content"></div>
      </div>
    </div>

    <!-- Chat Tab -->
    <div id="tab-chat" class="tab-content">
      <div class="chat-container" id="chat-container">
        <div class="message system-msg">
          Hello! Ask me anything about this webpage.
        </div>
      </div>
      
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Ask a question..." />
        <button id="chat-send-btn" class="primary-btn">Send</button>
      </div>
    </div>

    <!-- Settings Tab -->
    <div id="tab-settings" class="tab-content">
      <div class="settings-group">
        <label for="api-key-input">Gemini API Key (Free):</label>
        <input type="password" id="api-key-input" placeholder="AIza..." />
        <p class="help-text">Your key is stored securely in Chrome's local storage.</p>
      </div>
      <button id="save-settings-btn" class="primary-btn">Save Settings</button>
      <div id="settings-status" class="status-msg hidden">Saved!</div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
